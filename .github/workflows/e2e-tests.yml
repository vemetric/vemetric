name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to test. Defaults to the selected workflow ref.
        required: false
        type: string
  issue_comment:
    types:
      - created
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: e2e
  cancel-in-progress: false

jobs:
  tests:
    name: E2ETests
    runs-on: [vemetric-e2e]
    if: |
      github.event_name != 'issue_comment' ||
      (
        github.event.issue.pull_request &&
        startsWith(github.event.comment.body, '/run-e2e')
      )
    timeout-minutes: 30
    env:
      CI: 'true'
      E2E_BASE_URL: http://127.0.0.1:4000
      BETTER_AUTH_URL: http://127.0.0.1:4000
      VEMETRIC_DEV_PROXY_DISABLED: 'true'
      TURBO_TELEMETRY_DISABLED: '1'

    steps:
      - name: Resolve run target
        id: target
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName !== 'issue_comment') {
              core.setOutput('ref', '${{ inputs.ref || github.sha }}');
              return;
            }

            const { owner, repo } = context.repo;
            const commenter = context.payload.comment.user.login;
            const prNumber = context.payload.issue.number;

            const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: commenter,
            });

            if (!['admin', 'maintain', 'write'].includes(permission.permission)) {
              core.setFailed(`${commenter} does not have permission to run E2E tests.`);
              return;
            }

            const { data: pull } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            if (pull.head.repo.full_name !== `${owner}/${repo}`) {
              core.setFailed('Refusing to run E2E tests for forked PRs on the self-hosted runner.');
              return;
            }

            core.setOutput('ref', pull.head.sha);

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write test environment file
        run: |
          cp .env.example .env
          printf '\nBETTER_AUTH_URL=%s\n' "$BETTER_AUTH_URL" >> .env
          printf '\nVEMETRIC_DEV_PROXY_DISABLED=%s\n' "$VEMETRIC_DEV_PROXY_DISABLED" >> .env

      - name: Start test services
        run: docker compose -p vemetric-e2e-${{ github.run_id }} up -d --wait

      - name: Wait for test services
        run: |
          for i in {1..60}; do
            if docker compose -p vemetric-e2e-${{ github.run_id }} exec -T postgres pg_isready -U postgres -d vemetric; then
              break
            fi
            sleep 2
          done

          for i in {1..60}; do
            if docker compose -p vemetric-e2e-${{ github.run_id }} exec -T redis redis-cli ping; then
              break
            fi
            sleep 2
          done

          for i in {1..90}; do
            if [ "$(curl -fsS http://localhost:8123/ping)" = "Ok." ]; then
              exit 0
            fi
            sleep 2
          done

          docker compose -p vemetric-e2e-${{ github.run_id }} logs clickhouse
          exit 1

      - name: Generate Prisma client
        run: bun --filter database db:generate

      - name: Deploy Postgres migrations
        run: bun --filter database db:deploy

      - name: Deploy ClickHouse migrations
        run: bun --filter clickhouse migrate-local

      - name: Install Playwright browser
        run: bunx playwright install chromium

      - name: Print runner diagnostics
        working-directory: apps/e2e
        run: |
          uname -a
          bun --version
          bunx playwright --version
          pwd
          ls -la

      - name: Start app
        run: |
          bun --filter app dev --host 127.0.0.1 --strictPort > app.log 2>&1 &
          echo $! > app.pid
          for i in {1..60}; do
            if ! kill -0 "$(cat app.pid)" 2>/dev/null; then
              cat app.log
              exit 1
            fi
            if curl -fsS "$E2E_BASE_URL/login" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat app.log
          exit 1

      - name: Print app smoke diagnostics
        working-directory: apps/e2e
        run: |
          curl -fsS -I "$E2E_BASE_URL/login"
          bun run e2e:list

      - name: Run Playwright smoke tests
        timeout-minutes: 4
        env:
          DEBUG: pw:api,pw:browser
        working-directory: apps/e2e
        run: bun run e2e -- --reporter=line --workers=1 --timeout=30000 --global-timeout=120000 --trace=on

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report
          if-no-files-found: ignore

      - name: Upload app log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: app.log
          if-no-files-found: ignore

      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi

      - name: Stop test services
        if: always()
        run: docker compose -p vemetric-e2e-${{ github.run_id }} down -v --remove-orphans
